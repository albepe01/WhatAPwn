# Docker image used for AFL++ execution
image: aflplusplus/aflplusplus:latest

# Per-execution timeout for the target (in milliseconds)
exec_timeout_ms: 1000

# Default environment variables applied to all AFL++ instances
environment:
  AFL_IMPORT_FIRST: "1"
  AFL_FINAL_SYNC: "1"
  AFL_NO_AFFINITY: "1"
  AFL_TRY_AFFINITY: "0"
  AFL_SKIP_CPUFREQ: "1"

# LLVM mode variant using AFLFast power schedule
variant_list_llvm:
  - name: "fast"
    args: "-p fast"   # AFLFast strategy: prioritize rare paths
    env: {}

# QEMU mode variant with AFLFast
variant_list_qemu:
  - name: "fast-qemu"
    args: "-Q -p fast"
    env: {}